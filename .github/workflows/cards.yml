name: Update About cards

on:
  schedule:
    - cron: "0 3 * * *" # Runs once daily at moghaddas
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=moltack&show_icons=true&hide_border=true&count_private=true&card_width=500px
          path: static/profile/stats.svg
          token: ${{ secrets.METADATA_PAT }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=moltack&show_icons=true&hide_border=true&layout=compact&card_width=500px #&langs_count=6
          path: static/profile/top-langs.svg
          token: ${{ secrets.METADATA_PAT }}

#      - name: Generate pin card
#        uses: readme-tools/github-readme-stats-action@v1
#        with:
#          card: pin
#          options: username=readme-tools&repo=github-readme-stats
#          path: static/profile/pin-readme-tools-github-readme-stats.svg
#          token: ${{ secrets.METADATA_PAT }}

      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: username=${{ github.repository_owner }}&margin-w=2&column=4&title=MultiLanguage,LongTimeUser,Experience,Star
          path: static/profile/trophy.svg
          token: ${{ secrets.METADATA_PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
